<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>페이지를 찾을 수 없습니다 — Korea AI Map</title>
    <script>
      (() => {
        const legacyBase = '/korea-ai-map';
        if (location.pathname === legacyBase || location.pathname.startsWith(legacyBase + '/')) {
          const target = location.pathname.slice(legacyBase.length) || '/';
          location.replace(target + location.search + location.hash);
        }
      })();
    </script>
    <style>
      body { max-width: 42rem; margin: 15vh auto; padding: 0 1rem; font: 16px/1.6 system-ui, sans-serif; }
      a { color: #1a5fb4; }
    </style>
  </head>
  <body>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청한 페이지가 없거나 이동했습니다.</p>
    <p><a href="/">Korea AI Map 홈으로 이동</a></p>
  </body>
</html>
