name: "수정 제안"
description: "기존 항목의 잘못된 정보 수정을 제안합니다."
title: "[수정] "
labels: ["needs-review", "correction"]
body:
  - type: input
    id: entry
    attributes:
      label: 대상 항목 (id 또는 URL)
      placeholder: "예: exaone-3.5 또는 해당 상세 페이지 링크"
    validations:
      required: true
  - type: input
    id: field
    attributes:
      label: 수정할 필드
      placeholder: "예: license.commercial_use"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 현재 값 / 문제점
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: 제안하는 값
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: 근거 출처 (한 줄에 하나)
    validations:
      required: true
  - type: dropdown
    id: conflict
    attributes:
      label: 이해관계 여부
      options: ["없음", "있음"]
    validations:
      required: true
