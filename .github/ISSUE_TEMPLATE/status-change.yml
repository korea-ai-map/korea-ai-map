name: "상태 변경 신고"
description: "서비스 종료·폐업·모델 업데이트 등 상태 변화를 신고합니다."
title: "[상태] "
labels: ["needs-review", "status-change"]
body:
  - type: input
    id: entry
    attributes:
      label: 대상 항목 (id 또는 URL)
    validations:
      required: true
  - type: dropdown
    id: change
    attributes:
      label: 변경 유형
      options:
        - "서비스 종료 (archived)"
        - "폐업/해산"
        - "인수합병"
        - "모델 업데이트/신버전"
        - "지원 중단 (deprecated)"
        - "기타"
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: 상세 내용
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: 근거 출처 (한 줄에 하나)
    validations:
      required: true
