name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포 권한
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 정적 JSON API 생성 (web/public/data/*.json)
      - name: Install root deps
        run: npm install
      - name: Build data JSON
        run: npm run build:data
        env:
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}

      # Astro 정적 사이트 빌드
      - name: Install web deps
        working-directory: web
        run: npm install
      - name: Astro build
        working-directory: web
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
