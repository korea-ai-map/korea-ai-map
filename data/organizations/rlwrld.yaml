description_ko: >-
  퓨처플레이 창업자 류중희가 설립한 로보틱스 파운데이션 모델(RFM) 스타트업. 실세계·제조 데이터 기반으로 로봇이 사람처럼 손을 쓰는 정교한 조작(dexterity) 지능을 개발하며, 대표 모델 RLDX-1은
  5지 로봇손 조작에 특화. 2025년 해시드 주도로 LG전자·SKT·KDDI·ANA 등이 참여한 약 210억원 시드 투자와 함께 출범했다.
