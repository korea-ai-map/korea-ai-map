description_ko: >-
  2017년 설립된 한국 AI 스타트업. AI 영상 편집기 Vrew(브루), 문서 스캔 앱 vFlat, 고객의 소리(VoC) 분석 솔루션 VOC STUDIO를 서비스한다. 공동창업자는 남세동(대표)과
  장병규(크래프톤 이사회 의장). 2024년 10월 기준 누적 투자 약 465억 원(Altos Ventures, SoftBank Ventures Asia, InterVest, Murex Partners 등). 자체
  파운데이션 모델을 공개하지는 않았으나 음성인식 등 제품 핵심 AI를 자체 개발하는 AI 네이티브 제품 회사다.
