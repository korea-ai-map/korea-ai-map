  딥엑스의 엣지용 AI 추론 가속기(NPU) 칩이다. INT8 기준 약 25 TOPS 성능에 1~5W 저전력으로 동작하며, 최대 8GB LPDDR4x/5 메모리와 PCIe Gen3 인터페이스를 지원한다. 클라우드
